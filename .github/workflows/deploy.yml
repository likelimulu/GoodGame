name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - backend
          - frontend

jobs:
  # ── Build and push Docker image to ACR ───────────────────────────────────────
  docker-build-push:
    runs-on: ubuntu-latest
    if: inputs.target == 'both' || inputs.target == 'backend'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.django.prod
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/goodgame-api:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/goodgame-api:${{ github.sha }}

  # ── Deploy backend to Azure Container Apps ────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: inputs.target == 'both' || inputs.target == 'backend'

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new Container Apps revision
        run: |
          az containerapp update \
            --name goodgame-api \
            --resource-group goodgame-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/goodgame-api:${{ github.sha }}

  # ── Deploy frontend to Azure Static Web Apps ──────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    if: inputs.target == 'both' || inputs.target == 'frontend'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
