name: tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  # ── Job 1: Django test suite (runs on every push/PR to main and dev) ─────────
  backend-django-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: goodgame_test
          POSTGRES_USER: goodgameadmin
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-not-used-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: goodgame_test
      POSTGRES_USER: goodgameadmin
      POSTGRES_PASSWORD: testpass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: backend
        run: |
          python manage.py test -v 2

  # ── Job 2: Build Docker image and push to ACR (main branch only) ─────────────
  docker-build-push:
    runs-on: ubuntu-latest
    needs: backend-django-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.django.prod
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/goodgame-api:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/goodgame-api:${{ github.sha }}

  # ── Job 3: Deploy to Azure Container Apps (main branch only) ─────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new Container Apps revision
        run: |
          az containerapp update \
            --name goodgame-api \
            --resource-group goodgame-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/goodgame-api:${{ github.sha }}

  # ── Job 4: Build and deploy React frontend to Azure Static Web Apps ───────────
  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
