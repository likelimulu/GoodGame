services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.react.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    networks:
      - goodgame-network

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: goodgame
      POSTGRES_USER: goodgameadmin
      POSTGRES_PASSWORD: localpass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodgameadmin -d goodgame"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - goodgame-network

  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.django.dev
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_hubs;
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8000/admin/login/ > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - goodgame-network

volumes:
  pgdata:

networks:
  goodgame-network:
    driver: bridge
