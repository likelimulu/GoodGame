<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoodGame Login</title>
    <link rel="stylesheet" href="./goodgame-garage.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1 class="brand"><a class="brand-link" href="/goodgame-login.html">GoodGame</a></h1>
        <nav class="nav">
          <span>Game Hubs</span>
          <span>Patch Feed</span>
          <a href="/goodgame-post-create.html">Post Studio</a>
          <a class="active" href="/goodgame-login.html">Account</a>
        </nav>
      </header>

      <main class="page-grid">
        <section class="hero-card">
          <span class="eyebrow">Arcade Garage</span>
          <h1 class="headline">Welcome Back</h1>
          <p class="subhead">Sign in to continue to GoodGame.</p>
        </section>

        <section class="form-card">
          <p class="panel-tag">Account Access</p>
          <h2 class="section-title">Log In</h2>
          <p class="helper">Use your username and password.</p>

          <form class="form-fields" action="/goodgame-post-create.html">
            <div class="field">
              <label for="login-username">Username</label>
              <input id="login-username" name="username" type="text" placeholder="player123" required />
            </div>

            <div class="field">
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" placeholder="Enter your password" required />
            </div>

            <div class="check-row">
              <label class="check">
                <input name="remember_me" type="checkbox" />
                <span>Keep me signed in on this device</span>
              </label>
              <a class="text-link" href="#">Forgot password?</a>
            </div>

            <div class="action-row">
              <button class="btn primary" type="submit">Log In</button>
            </div>
          </form>

          <p class="inline-copy">New here? <a class="text-link" href="/goodgame-signup.html">Create an account</a>.</p>
        </section>
      </main>
    </div>
  </body>
</html>
